<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smiski World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        #ui-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            pointer-events: none;
            font-family: 'Segoe UI', sans-serif;
        }

        #time-display {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        #date-display {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        #weather-display {
            font-size: 16px;
            opacity: 0.9;
        }

        #controls-info {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 24px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            font-size: 13px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        #smiski-info {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            display: none;
            transition: all 0.3s ease;
        }

        .smiski-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .smiski-status {
            font-size: 14px;
            opacity: 0.9;
            text-transform: capitalize;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loading-spinner"></div>
        <div>Loading Smiski World...</div>
    </div>

    <div id="canvas-container"></div>
    
    <div id="ui-overlay">
        <div id="time-display">12:00</div>
        <div id="date-display">Monday, January 1</div>
        <div id="weather-display">☀️ Sunny</div>
    </div>

    <div id="controls-info">
        🖱️ Left Click + Drag: Rotate | Scroll: Zoom | Right Click + Drag: Pan | Click Smiski: View Info
    </div>

    <div id="smiski-info">
        <div class="smiski-name" id="smiski-name"></div>
        <div class="smiski-status" id="smiski-status"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.0003);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true,
            alpha: false
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.getElementById('canvas-container').appendChild(labelRenderer.domElement);

        // Camera
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 300);
        camera.position.set(30, 25, 35);
        camera.lookAt(0, 0, 0);

        // Orbit controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 5;
        controls.maxDistance = 100;
        controls.maxPolarAngle = Math.PI / 2.1;
        controls.target.set(0, 1, 0);
        controls.update();

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404066, 0.6);
        scene.add(ambientLight);

        const hemiLight = new THREE.HemisphereLight(0xddeeff, 0x889966, 0.6);
        scene.add(hemiLight);

        const sunLight = new THREE.DirectionalLight(0xfff8e7, 3.0);
        sunLight.position.set(50, 60, 30);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 4096;
        sunLight.shadow.mapSize.height = 4096;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 200;
        sunLight.shadow.camera.left = -70;
        sunLight.shadow.camera.right = 70;
        sunLight.shadow.camera.top = 70;
        sunLight.shadow.camera.bottom = -70;
        sunLight.shadow.bias = -0.00005;
        sunLight.shadow.normalBias = 0.02;
        scene.add(sunLight);

        // Sky
        const skyGeometry = new THREE.SphereGeometry(120, 32, 32);
        const skyMaterial = new THREE.ShaderMaterial({
            uniforms: {
                topColor: { value: new THREE.Color(0x0077ff) },
                bottomColor: { value: new THREE.Color(0xffffff) },
                offset: { value: 33 },
                exponent: { value: 0.6 }
            },
            vertexShader: `
                varying vec3 vWorldPosition;
                void main() {
                    vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                    vWorldPosition = worldPosition.xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 topColor;
                uniform vec3 bottomColor;
                uniform float offset;
                uniform float exponent;
                varying vec3 vWorldPosition;
                void main() {
                    float h = normalize(vWorldPosition + offset).y;
                    gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
                }
            `,
            side: THREE.BackSide
        });
        const sky = new THREE.Mesh(skyGeometry, skyMaterial);
        scene.add(sky);

        // Ground with realistic grass texture
        function createGround() {
            const groundGroup = new THREE.Group();
            
            // Main ground plane with subtle terrain
            const groundGeometry = new THREE.PlaneGeometry(200, 200, 100, 100);
            const positions = groundGeometry.attributes.position;
            
            // Add terrain variation
            for (let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const y = positions.getY(i);
                const z = (Math.sin(x * 0.05) * Math.cos(y * 0.05) * 1.5) + 
                         (Math.sin(x * 0.15) * Math.cos(y * 0.15) * 0.5) +
                         (Math.random() * 0.1);
                positions.setZ(i, z);
            }
            groundGeometry.computeVertexNormals();
            
            // Create canvas texture for grass
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Base grass color
            ctx.fillStyle = '#4a7c3f';
            ctx.fillRect(0, 0, 512, 512);
            
            // Add variation
            for (let i = 0; i < 5000; i++) {
                const x = Math.random() * 512;
                const y = Math.random() * 512;
                const shade = 60 + Math.random() * 40;
                ctx.fillStyle = `rgb(${shade - 10}, ${shade + 20}, ${shade - 15})`;
                ctx.fillRect(x, y, 3, 3);
            }
            
            const grassTexture = new THREE.CanvasTexture(canvas);
            grassTexture.wrapS = THREE.RepeatWrapping;
            grassTexture.wrapT = THREE.RepeatWrapping;
            grassTexture.repeat.set(40, 40);
            
            const groundMaterial = new THREE.MeshStandardMaterial({ 
                map: grassTexture,
                color: 0x5a8f3c,
                roughness: 0.9,
                metalness: 0.0,
                flatShading: false
            });
            
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            groundGroup.add(ground);
            
            return groundGroup;
        }

        // Create realistic grass patches
        function createGrassPatches() {
            const grassGroup = new THREE.Group();
            
            // Create grass blade geometry
            function createGrassBlade(height, width) {
                const shape = new THREE.Shape();
                shape.moveTo(0, 0);
                shape.lineTo(-width/2, height);
                shape.lineTo(0, height * 1.1);
                shape.lineTo(width/2, height);
                shape.closePath();
                
                const geometry = new THREE.ShapeGeometry(shape);
                return geometry;
            }
            
            // Create patches of grass
            for (let patch = 0; patch < 50; patch++) {
                const patchGroup = new THREE.Group();
                const patchX = (Math.random() - 0.5) * 80;
                const patchZ = (Math.random() - 0.5) * 80;
                const bladeCount = 20 + Math.floor(Math.random() * 30);
                
                for (let i = 0; i < bladeCount; i++) {
                    const height = 0.3 + Math.random() * 0.8;
                    const width = 0.05 + Math.random() * 0.1;
                    const bladeGeometry = createGrassBlade(height, width);
                    
                    const greenHue = 0.2 + Math.random() * 0.2;
                    const bladeMaterial = new THREE.MeshStandardMaterial({
                        color: new THREE.Color().setHSL(greenHue, 0.7, 0.2 + Math.random() * 0.3),
                        side: THREE.DoubleSide,
                        roughness: 0.8
                    });
                    
                    const blade = new THREE.Mesh(bladeGeometry, bladeMaterial);
                    blade.position.set(
                        (Math.random() - 0.5) * 2,
                        0,
                        (Math.random() - 0.5) * 2
                    );
                    blade.rotation.y = Math.random() * Math.PI;
                    blade.rotation.x = (Math.random() - 0.5) * 0.3;
                    blade.rotation.z = (Math.random() - 0.5) * 0.3;
                    blade.castShadow = true;
                    blade.receiveShadow = true;
                    
                    patchGroup.add(blade);
                }
                
                patchGroup.position.set(patchX, 0, patchZ);
                grassGroup.add(patchGroup);
            }
            
            return grassGroup;
        }

        // Create realistic trees
        function createTree(x, z, scale = 1) {
            const tree = new THREE.Group();
            
            // Trunk with varied brown
            const trunkHeight = 4 + Math.random() * 3;
            const trunkGeometry = new THREE.CylinderGeometry(0.2 * scale, 0.4 * scale, trunkHeight * scale, 12);
            const trunkMaterial = new THREE.MeshStandardMaterial({ 
                color: new THREE.Color().setHSL(0.08, 0.6, 0.2 + Math.random() * 0.2),
                roughness: 0.9,
                metalness: 0.0
            });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = trunkHeight * scale / 2;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            tree.add(trunk);
            
            // Multiple leaf clusters for realistic look
            const leafCount = 8 + Math.floor(Math.random() * 8);
            const leafColors = [
                new THREE.Color().setHSL(0.25, 0.8, 0.2),
                new THREE.Color().setHSL(0.28, 0.7, 0.25),
                new THREE.Color().setHSL(0.22, 0.75, 0.3),
                new THREE.Color().setHSL(0.3, 0.8, 0.22)
            ];
            
            for (let i = 0; i < leafCount; i++) {
                const leafSize = (0.8 + Math.random() * 1.5) * scale;
                const leafGeometry = new THREE.SphereGeometry(leafSize, 10, 8);
                const leafMaterial = new THREE.MeshStandardMaterial({ 
                    color: leafColors[Math.floor(Math.random() * leafColors.length)],
                    roughness: 0.7,
                    metalness: 0.0
                });
                const leaves = new THREE.Mesh(leafGeometry, leafMaterial);
                
                const angle = (i / leafCount) * Math.PI * 2 + Math.random() * 0.5;
                const radius = (1 + Math.random() * 2) * scale;
                const heightVar = trunkHeight * scale * 0.6 + Math.random() * trunkHeight * scale * 0.5;
                
                leaves.position.y = heightVar;
                leaves.position.x = Math.cos(angle) * radius;
                leaves.position.z = Math.sin(angle) * radius;
                leaves.scale.setScalar(0.8 + Math.random() * 0.4);
                leaves.castShadow = true;
                leaves.receiveShadow = true;
                tree.add(leaves);
            }
            
            tree.position.set(x, 0, z);
            return tree;
        }

        // Create flowers and bushes
        function createFlowers(x, z, count) {
            const flowerGroup = new THREE.Group();
            
            for (let i = 0; i < count; i++) {
                const flower = new THREE.Group();
                
                // Stem
                const stemHeight = 0.3 + Math.random() * 1;
                const stemGeometry = new THREE.CylinderGeometry(0.02, 0.03, stemHeight, 8);
                const stemMaterial = new THREE.MeshStandardMaterial({ 
                    color: new THREE.Color().setHSL(0.25, 0.8, 0.3)
                });
                const stem = new THREE.Mesh(stemGeometry, stemMaterial);
                stem.position.y = stemHeight / 2;
                stem.castShadow = true;
                flower.add(stem);
                
                // Flower head
                const petalColor = new THREE.Color().setHSL(Math.random(), 0.9, 0.5 + Math.random() * 0.3);
                const petalGeometry = new THREE.SphereGeometry(0.1 + Math.random() * 0.2, 8, 6);
                const petalMaterial = new THREE.MeshStandardMaterial({ 
                    color: petalColor,
                    roughness: 0.4
                });
                const petals = new THREE.Mesh(petalGeometry, petalMaterial);
                petals.position.y = stemHeight;
                petals.castShadow = true;
                flower.add(petals);
                
                flower.position.set(
                    (Math.random() - 0.5) * 4,
                    0,
                    (Math.random() - 0.5) * 4
                );
                flowerGroup.add(flower);
            }
            
            flowerGroup.position.set(x, 0, z);
            return flowerGroup;
        }

        // Create rocks
        function createRocks(count, spread) {
            const rockGroup = new THREE.Group();
            
            for (let i = 0; i < count; i++) {
                const size = 0.2 + Math.random() * 0.8;
                const rockGeometry = new THREE.IcosahedronGeometry(size, 1);
                // Deform vertices slightly
                const positions = rockGeometry.attributes.position;
                for (let j = 0; j < positions.count; j++) {
                    positions.setX(j, positions.getX(j) * (0.8 + Math.random() * 0.4));
                    positions.setY(j, positions.getY(j) * (0.8 + Math.random() * 0.4));
                    positions.setZ(j, positions.getZ(j) * (0.8 + Math.random() * 0.4));
                }
                rockGeometry.computeVertexNormals();
                
                const rockMaterial = new THREE.MeshStandardMaterial({ 
                    color: new THREE.Color().setHSL(0.08, 0.05, 0.3 + Math.random() * 0.5),
                    roughness: 0.7
                });
                const rock = new THREE.Mesh(rockGeometry, rockMaterial);
                rock.position.set(
                    (Math.random() - 0.5) * spread,
                    size * 0.3,
                    (Math.random() - 0.5) * spread
                );
                rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                rock.castShadow = true;
                rock.receiveShadow = true;
                rockGroup.add(rock);
            }
            
            return rockGroup;
        }

        // Create path
        function createGravelPath(startX, startZ, endX, endZ) {
            const path = new THREE.Group();
            const steps = 30;
            
            for (let i = 0; i < steps; i++) {
                const t = i / steps;
                const x = startX + (endX - startX) * t;
                const z = startZ + (endZ - startZ) * t + Math.sin(t * Math.PI * 2) * 1.5;
                
                const stoneGeometry = new THREE.CylinderGeometry(
                    0.4 + Math.random() * 0.3,
                    0.5 + Math.random() * 0.3,
                    0.05 + Math.random() * 0.05,
                    8
                );
                const stoneMaterial = new THREE.MeshStandardMaterial({ 
                    color: new THREE.Color().setHSL(0.1, 0.05, 0.4 + Math.random() * 0.3),
                    roughness: 0.7
                });
                const stone = new THREE.Mesh(stoneGeometry, stoneMaterial);
                stone.position.set(x, 0.03, z);
                stone.rotation.x = (Math.random() - 0.5) * 0.2;
                stone.rotation.z = (Math.random() - 0.5) * 0.2;
                stone.receiveShadow = true;
                stone.castShadow = true;
                path.add(stone);
            }
            
            return path;
        }

        // Smiski class
        class Smiski {
            constructor(name, color, startPosition) {
                this.name = name;
                this.color = color;
                this.position = startPosition.clone();
                this.targetPosition = startPosition.clone();
                this.speed = 1.5 + Math.random() * 1;
                this.state = 'idle';
                this.stateTimer = 0;
                this.animationTime = Math.random() * Math.PI * 2;
                this.lastStateChange = 0;
                
                this.mesh = new THREE.Group();
                
                // Body
                const bodyGeometry = new THREE.CapsuleGeometry(0.3, 0.8, 8, 16);
                const bodyMaterial = new THREE.MeshStandardMaterial({ 
                    color: color,
                    roughness: 0.4,
                    metalness: 0.05
                });
                this.body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                this.body.position.y = 0.8;
                this.body.castShadow = true;
                this.body.receiveShadow = true;
                this.mesh.add(this.body);
                
                // Head
                const headGeometry = new THREE.SphereGeometry(0.4, 32, 32);
                const headMaterial = new THREE.MeshStandardMaterial({ 
                    color: color,
                    roughness: 0.35,
                    metalness: 0.05
                });
                this.head = new THREE.Mesh(headGeometry, headMaterial);
                this.head.position.y = 1.7;
                this.head.castShadow = true;
                this.head.receiveShadow = true;
                this.mesh.add(this.head);
                
                // Eyes
                const eyeGeometry = new THREE.SphereGeometry(0.09, 16, 16);
                const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 });
                
                this.leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                this.leftEye.position.set(-0.14, 1.85, 0.35);
                this.mesh.add(this.leftEye);
                
                this.rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                this.rightEye.position.set(0.14, 1.85, 0.35);
                this.mesh.add(this.rightEye);
                
                // Eye highlights
                const highlightGeometry = new THREE.SphereGeometry(0.04, 8, 8);
                const highlightMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xffffff,
                    roughness: 0.1,
                    emissive: 0xffffff,
                    emissiveIntensity: 0.5
                });
                
                const leftHighlight = new THREE.Mesh(highlightGeometry, highlightMaterial);
                leftHighlight.position.set(-0.12, 1.88, 0.42);
                this.mesh.add(leftHighlight);
                
                const rightHighlight = new THREE.Mesh(highlightGeometry, highlightMaterial);
                rightHighlight.position.set(0.16, 1.88, 0.42);
                this.mesh.add(rightHighlight);
                
                // Smile
                const smileShape = new THREE.Shape();
                smileShape.absarc(0, 0, 0.12, Math.PI * 0.2, Math.PI * 0.8, true);
                const smileGeometry = new THREE.ExtrudeGeometry(smileShape, {
                    depth: 0.02,
                    bevelEnabled: true,
                    bevelThickness: 0.01,
                    bevelSize: 0.01
                });
                const smileMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x333333,
                    roughness: 0.3
                });
                this.smile = new THREE.Mesh(smileGeometry, smileMaterial);
                this.smile.position.set(0, 1.78, 0.3);
                this.smile.rotation.x = 0.1;
                this.mesh.add(this.smile);
                
                // Arms
                const armGeometry = new THREE.CapsuleGeometry(0.07, 0.5, 4, 8);
                const armMaterial = new THREE.MeshStandardMaterial({ 
                    color: color,
                    roughness: 0.4
                });
                
                this.leftArm = new THREE.Mesh(armGeometry, armMaterial);
                this.leftArm.position.set(-0.37, 1.2, 0);
                this.leftArm.rotation.z = 0.3;
                this.leftArm.castShadow = true;
                this.mesh.add(this.leftArm);
                
                this.rightArm = new THREE.Mesh(armGeometry, armMaterial);
                this.rightArm.position.set(0.37, 1.2, 0);
                this.rightArm.rotation.z = -0.3;
                this.rightArm.castShadow = true;
                this.mesh.add(this.rightArm);
                
                // Label
                const labelDiv = document.createElement('div');
                labelDiv.textContent = name;
                labelDiv.style.color = 'white';
                labelDiv.style.fontSize = '11px';
                labelDiv.style.fontWeight = 'bold';
                labelDiv.style.textShadow = '1px 1px 3px rgba(0,0,0,0.8)';
                labelDiv.style.background = 'rgba(0,0,0,0.5)';
                labelDiv.style.padding = '2px 8px';
                labelDiv.style.borderRadius = '10px';
                this.label = new CSS2DObject(labelDiv);
                this.label.position.y = 2.3;
                this.mesh.add(this.label);
                
                this.mesh.position.copy(startPosition);
                
                // Personality
                this.personality = {
                    activityLevel: 0.3 + Math.random() * 0.7,
                    socialLevel: Math.random(),
                    homePreference: 0.2 + Math.random() * 0.6,
                    curiosityLevel: Math.random()
                };
                
                this.schedule = this.generateSchedule();
                this.decideNewAction();
            }
            
            generateSchedule() {
                const now = new Date();
                return {
                    wakeUp: 6 + Math.floor(Math.random() * 2),
                    breakfast: 8 + Math.floor(Math.random() * 2),
                    morningActivity: 10,
                    lunch: 12 + Math.floor(Math.random() * 2),
                    afternoonActivity: 14,
                    eveningActivity: 17,
                    dinner: 19,
                    bedtime: 22 + Math.floor(Math.random() * 2)
                };
            }
            
            getCurrentActivity() {
                const now = new Date();
                const hour = now.getHours() + now.getMinutes() / 60;
                
                if (hour < this.schedule.wakeUp || hour >= this.schedule.bedtime) {
                    return 'sleeping';
                } else if (hour >= this.schedule.breakfast && hour < this.schedule.breakfast + 1) {
                    return 'eating';
                } else if (hour >= this.schedule.lunch && hour < this.schedule.lunch + 1) {
                    return 'eating';
                } else if (hour >= this.schedule.dinner && hour < this.schedule.dinner + 1) {
                    return 'eating';
                } else if (hour >= this.schedule.morningActivity && hour < this.schedule.morningActivity + 2) {
                    return this.personality.activityLevel > 0.6 ? 'exploring' : 'gardening';
                } else if (hour >= this.schedule.afternoonActivity && hour < this.schedule.afternoonActivity + 3) {
                    return 'playing';
                } else {
                    const rand = Math.random();
                    if (rand < 0.3) return 'walking';
                    if (rand < 0.6) return 'sitting';
                    if (rand < 0.8) return 'exploring';
                    return 'idle';
                }
            }
            
            decideNewAction() {
                this.state = this.getCurrentActivity();
                this.stateTimer = 5 + Math.random() * 15;
                this.lastStateChange = performance.now() / 1000;
                
                if (this.state === 'walking' || this.state === 'exploring') {
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 2 + Math.random() * 10;
                    this.targetPosition.set(
                        this.position.x + Math.cos(angle) * distance,
                        0,
                        this.position.z + Math.sin(angle) * distance
                    );
                } else if (this.state === 'gardening') {
                    this.targetPosition.set(
                        -18 + (Math.random() - 0.5) * 14,
                        0,
                        2 + (Math.random() - 0.5) * 14
                    );
                } else if (this.state === 'playing') {
                    this.targetPosition.set(
                        -10 + Math.random() * 20,
                        0,
                        -5 + Math.random() * 15
                    );
                } else {
                    this.targetPosition.set(
                        -3 + (Math.random() - 0.5) * 8,
                        0,
                        -3 + (Math.random() - 0.5) * 8
                    );
                }
                
                this.targetPosition.x = Math.max(-35, Math.min(35, this.targetPosition.x));
                this.targetPosition.z = Math.max(-35, Math.min(35, this.targetPosition.z));
            }
            
            update(deltaTime) {
                const now = performance.now() / 1000;
                
                if (now - this.lastStateChange > 60) {
                    const newActivity = this.getCurrentActivity();
                    if (newActivity !== this.state) {
                        this.decideNewAction();
                    }
                }
                
                this.stateTimer -= deltaTime;
                if (this.stateTimer <= 0) {
                    this.decideNewAction();
                }
                
                if (this.position.distanceTo(this.targetPosition) > 0.2) {
                    const direction = this.targetPosition.clone().sub(this.position).normalize();
                    const moveSpeed = this.state === 'exploring' ? this.speed * 0.7 : this.speed;
                    const distance = Math.min(moveSpeed * deltaTime, this.position.distanceTo(this.targetPosition));
                    this.position.add(direction.clone().multiplyScalar(distance));
                    
                    if (distance > 0.01) {
                        const targetRotation = Math.atan2(direction.x, direction.z);
                        this.mesh.rotation.y += (targetRotation - this.mesh.rotation.y) * 0.1;
                    }
                    
                    this.animationTime += deltaTime * 10;
                    const bobAmount = Math.sin(this.animationTime) * 0.15;
                    this.mesh.position.y = bobAmount;
                    this.leftArm.rotation.x = Math.sin(this.animationTime) * 0.6;
                    this.rightArm.rotation.x = -Math.sin(this.animationTime) * 0.6;
                } else {
                    this.animationTime += deltaTime * 1.5;
                    const breatheAmount = Math.sin(this.animationTime) * 0.03;
                    this.mesh.position.y = breatheAmount;
                    this.leftArm.rotation.x = Math.sin(this.animationTime * 0.5) * 0.1;
                    this.rightArm.rotation.x = Math.sin(this.animationTime * 0.5 + Math.PI) * 0.1;
                    
                    if (Math.random() < 0.01) {
                        this.mesh.rotation.y += (Math.random() - 0.5) * 0.5;
                    }
                }
                
                this.mesh.position.x = this.position.x;
                this.mesh.position.z = this.position.z;
            }
        }

        // Load house model and build scene
        const loader = new GLTFLoader();
        let houseModel = null;

        function buildScene() {
            // Add ground
            const ground = createGround();
            scene.add(ground);
            
            // Add grass patches around the scene
            const grass = createGrassPatches();
            scene.add(grass);
            
            // Add trees in a nice arrangement
            const treePositions = [
                [-25, -25], [25, -25], [-25, 25], [25, 25],
                [-30, 0], [30, 0], [0, -30], [0, 30],
                [-20, -30], [20, -30], [-30, -20], [30, -20],
                [-15, 20], [15, 20], [20, -15], [-20, -15],
                [-35, -15], [35, -15], [-35, 15], [35, 15]
            ];
            
            treePositions.forEach(([x, z]) => {
                const tree = createTree(x, z, 0.8 + Math.random() * 0.6);
                scene.add(tree);
            });
            
            // Add flower patches
            const flowerPositions = [
                [-20, -20], [-20, -10], [-10, -20],
                [20, -20], [20, -10], [10, -20],
                [-20, 20], [-20, 10], [-10, 20],
                [20, 20], [20, 10], [10, 20],
                [-28, -8], [28, -8], [-8, -28], [8, -28]
            ];
            
            flowerPositions.forEach(([x, z]) => {
                const flowers = createFlowers(x, z, 15 + Math.floor(Math.random() * 20));
                scene.add(flowers);
            });
            
            // Add rocks scattered around
            const rocks1 = createRocks(15, 10);
            rocks1.position.set(-25, 0, -15);
            scene.add(rocks1);
            
            const rocks2 = createRocks(10, 8);
            rocks2.position.set(20, 0, -25);
            scene.add(rocks2);
            
            const rocks3 = createRocks(12, 12);
            rocks3.position.set(25, 0, 20);
            scene.add(rocks3);
            
            // Add paths
            const path1 = createGravelPath(-10, 0, -10, -15);
            scene.add(path1);
            
            const path2 = createGravelPath(-10, 0, 15, 0);
            scene.add(path2);
            
            // Position house when loaded
            if (houseModel) {
                houseModel.position.set(0, 0, 0);
                // Adjust position based on your model
                scene.add(houseModel);
            }
            
            // Create Smiskis
            const smiskis = [];
            const smiskiConfigs = [
                { name: 'Luna', color: 0xFFB6C1, pos: new THREE.Vector3(-5, 0, -8) },
                { name: 'Mochi', color: 0x98FB98, pos: new THREE.Vector3(5, 0, -5) },
                { name: 'Pippin', color: 0xFFD700, pos: new THREE.Vector3(-8, 0, 5) },
                { name: 'Gizmo', color: 0xDDA0DD, pos: new THREE.Vector3(8, 0, 8) }
            ];

            smiskiConfigs.forEach(config => {
                const smiski = new Smiski(config.name, config.color, config.pos);
                smiskis.push(smiski);
                scene.add(smiski.mesh);
            });
            
            // Raycaster for clicking
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            const smiskiMeshes = smiskis.map(s => s.mesh);

            window.addEventListener('click', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(smiskiMeshes, true);
                
                if (intersects.length > 0) {
                    let hitObject = intersects[0].object;
                    while (hitObject && !smiskiMeshes.includes(hitObject)) {
                        hitObject = hitObject.parent;
                    }
                    
                    if (hitObject) {
                        const smiski = smiskis.find(s => s.mesh === hitObject);
                        if (smiski) {
                            const infoDiv = document.getElementById('smiski-info');
                            document.getElementById('smiski-name').textContent = smiski.name;
                            
                            const statusText = {
                                'sleeping': '😴 Sleeping',
                                'eating': '🍽️ Eating',
                                'walking': '🚶 Walking',
                                'exploring': '🔍 Exploring',
                                'gardening': '🌱 Gardening',
                                'playing': '🎮 Playing',
                                'sitting': '💺 Sitting',
                                'idle': '💭 Daydreaming'
                            };
                            
                            document.getElementById('smiski-status').textContent = 
                                statusText[smiski.state] || smiski.state;
                            infoDiv.style.display = 'block';
                            
                            setTimeout(() => {
                                infoDiv.style.display = 'none';
                            }, 4000);
                        }
                    }
                }
            });
            
            // Hide loading screen
            document.getElementById('loading-screen').style.display = 'none';
            
            // Return smiskis for animation loop
            return smiskis;
        }

        // Load the house
        console.log('Loading house model...');
        loader.load(
            'models/house.glb',
            (gltf) => {
                console.log('House loaded successfully!');
                houseModel = gltf.scene;
                
                // Enable shadows on all meshes
                houseModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                // Build the rest of the scene
                const smiskis = buildScene();
                
                // Time display
                function updateTimeDisplay() {
                    const now = new Date();
                    const hours = now.getHours().toString().padStart(2, '0');
                    const minutes = now.getMinutes().toString().padStart(2, '0');
                    document.getElementById('time-display').textContent = `${hours}:${minutes}`;
                    
                    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
                    document.getElementById('date-display').textContent = 
                        `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
                    
                    const hour = now.getHours();
                    let weatherEmoji = '☀️ Sunny';
                    if (hour >= 5 && hour < 8) weatherEmoji = '🌅 Dawn';
                    else if (hour >= 8 && hour < 17) weatherEmoji = '☀️ Sunny';
                    else if (hour >= 17 && hour < 19) weatherEmoji = '🌅 Dusk';
                    else weatherEmoji = '🌙 Night';
                    document.getElementById('weather-display').textContent = weatherEmoji;
                }

                // Animation loop
                const clock = new THREE.Clock();
                let lastTimeUpdate = 0;

                function animate() {
                    requestAnimationFrame(animate);
                    
                    const deltaTime = Math.min(clock.getDelta(), 0.1);
                    
                    const now = Date.now();
                    if (now - lastTimeUpdate > 1000) {
                        updateTimeDisplay();
                        lastTimeUpdate = now;
                    }
                    
                    // Dynamic lighting
                    const date = new Date();
                    const hour = date.getHours() + date.getMinutes() / 60;
                    
                    if (hour >= 6 && hour < 20) {
                        const dayProgress = (hour - 6) / 14;
                        const intensity = 1 + Math.sin(dayProgress * Math.PI) * 2;
                        sunLight.intensity = Math.max(0.3, intensity);
                        sunLight.position.y = Math.sin(dayProgress * Math.PI) * 50;
                        
                        const skyTopColor = new THREE.Color().setHSL(0.58, 0.8, 0.35 + dayProgress * 0.3);
                        const skyBottomColor = new THREE.Color().setHSL(0.58, 0.3, 0.65 + dayProgress * 0.2);
                        skyMaterial.uniforms.topColor.value = skyTopColor;
                        skyMaterial.uniforms.bottomColor.value = skyBottomColor;
                        
                        scene.fog.color.copy(new THREE.Color().setHSL(0.58, 0.3, 0.55 + dayProgress * 0.3));
                        renderer.toneMappingExposure = 0.9 + dayProgress * 0.8;
                        scene.background.copy(skyTopColor);
                    } else {
                        sunLight.intensity = 0.08;
                        sunLight.position.y = 5;
                        
                        const nightColor = new THREE.Color(0x0a0a2e);
                        skyMaterial.uniforms.topColor.value = nightColor;
                        skyMaterial.uniforms.bottomColor.value = new THREE.Color(0x1a1a3e);
                        scene.fog.color.set(0x0a0a2e);
                        renderer.toneMappingExposure = 0.4;
                        scene.background.copy(nightColor);
                    }
                    
                    // Update Smiskis
                    if (smiskis) {
                        smiskis.forEach(smiski => smiski.update(deltaTime));
                    }
                    
                    controls.update();
                    renderer.render(scene, camera);
                    labelRenderer.render(scene, camera);
                }

                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    labelRenderer.setSize(window.innerWidth, window.innerHeight);
                });

                updateTimeDisplay();
                animate();
                
                console.log('🌟 Smiski World is ready!');
                console.log('🏠 Your custom house is loaded');
                console.log('🌳 Realistic trees, grass, flowers, and rocks');
                console.log('👾 4 Smiskis with daily schedules');
                console.log('🌅 Real-time day/night cycle');
            },
            (progress) => {
                const percent = (progress.loaded / progress.total * 100).toFixed(0);
                console.log(`Loading: ${percent}%`);
            },
            (error) => {
                console.error('Error loading house model:', error);
                document.getElementById('loading-screen').innerHTML = 
                    '<div style="color: red;">Error loading house model. Check console for details.</div>';
            }
        );
    </script>
</body>
</html>
