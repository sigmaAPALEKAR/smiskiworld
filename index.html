<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smiski World</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>
    
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading Smiski World</div>
            <div class="loading-progress">
                <div class="loading-bar"></div>
            </div>
        </div>
    </div>

    <!-- Top Bar -->
    <div id="top-bar">
        <div class="top-bar-left">
            <div class="logo">🏠 Smiski World</div>
        </div>
        <div class="top-bar-center">
            <div class="time-display">
                <span class="time" id="time-display">12:00</span>
                <span class="ampm" id="ampm-display">PM</span>
            </div>
            <div class="date-display" id="date-display">Monday, January 1</div>
        </div>
        <div class="top-bar-right">
            <div class="weather-badge" id="weather-display">
                <span class="weather-icon">☀️</span>
                <span class="weather-text">Sunny</span>
            </div>
        </div>
    </div>

    <!-- Bottom Bar - Smiski Follow Buttons -->
    <div id="bottom-bar">
        <div class="smiski-buttons">
            <button class="smiski-btn active" data-smiski="0">
                <div class="smiski-btn-avatar" style="background: #FFB6C1;"></div>
                <span class="smiski-btn-name">Luna</span>
                <span class="smiski-btn-status">🚶 Walking</span>
            </button>
            <button class="smiski-btn" data-smiski="1">
                <div class="smiski-btn-avatar" style="background: #98FB98;"></div>
                <span class="smiski-btn-name">Mochi</span>
                <span class="smiski-btn-status">💭 Idle</span>
            </button>
            <button class="smiski-btn" data-smiski="2">
                <div class="smiski-btn-avatar" style="background: #FFD700;"></div>
                <span class="smiski-btn-name">Pippin</span>
                <span class="smiski-btn-status">🔍 Exploring</span>
            </button>
            <button class="smiski-btn" data-smiski="3">
                <div class="smiski-btn-avatar" style="background: #DDA0DD;"></div>
                <span class="smiski-btn-name">Gizmo</span>
                <span class="smiski-btn-status">🌱 Gardening</span>
            </button>
        </div>
        <button id="freecam-btn" class="freecam-btn active">
            <span>🎥 Free Camera</span>
        </button>
    </div>

    <!-- Smiski Info Panel -->
    <div id="smiski-panel" class="smiski-panel hidden">
        <div class="panel-header">
            <div class="panel-avatar" id="panel-avatar"></div>
            <div>
                <div class="panel-name" id="panel-name"></div>
                <div class="panel-status" id="panel-status"></div>
            </div>
            <button class="panel-close" id="panel-close">×</button>
        </div>
        <div class="panel-body">
            <div class="panel-stat">
                <span class="stat-label">Activity</span>
                <span class="stat-value" id="panel-activity">Walking</span>
            </div>
            <div class="panel-stat">
                <span class="stat-label">Mood</span>
                <span class="stat-value" id="panel-mood">Happy</span>
            </div>
            <div class="panel-stat">
                <span class="stat-label">Energy</span>
                <div class="stat-bar">
                    <div class="stat-bar-fill" id="panel-energy" style="width: 75%;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Controls hint -->
    <div id="controls-hint">
        <span>🖱️ Drag to orbit</span>
        <span>🔍 Scroll to zoom</span>
        <span>👆 Click Smiski for info</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
